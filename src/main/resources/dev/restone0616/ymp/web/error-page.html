<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.15);
            --card-border: rgba(255, 255, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.65);
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 20px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .bg-blur {
            position: fixed;
            inset: -40px;
            z-index: -2;
            background-image: url('http://localhost:38125/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(28px) brightness(0.5) saturate(1.3);
            transform: scale(1.08);
            transition: filter 0.6s ease;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at center,
            rgba(0, 0, 0, 0.2) 0%,
            rgba(0, 0, 0, 0.5) 60%,
            rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
        }

        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
            animation: floatOrb 10s ease-in-out infinite;
        }
        .ambient-orb.orb-1 {
            width: 280px;
            height: 280px;
            background: #ef4444;
            top: -8%;
            left: -5%;
            animation-delay: 0s;
        }
        .ambient-orb.orb-2 {
            width: 220px;
            height: 220px;
            background: #f87171;
            bottom: -10%;
            right: -6%;
            animation-delay: -4s;
            animation-duration: 12s;
        }
        .ambient-orb.orb-3 {
            width: 180px;
            height: 180px;
            background: #fca5a5;
            top: 50%;
            left: 60%;
            animation-delay: -7s;
            animation-duration: 14s;
        }

        @keyframes floatOrb {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -30px) scale(1.15);
            }
            50% {
                transform: translate(-20px, 25px) scale(0.9);
            }
            75% {
                transform: translate(-35px, -15px) scale(1.05);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 440px;
            max-width: 92vw;
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            padding: 44px 36px 40px;
            text-align: center;
            animation: cardEntrance 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.94);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .error-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.18);
            margin-bottom: 22px;
            position: relative;
            animation: iconPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
        }
        .error-icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(239, 68, 68, 0.35);
            animation: pulseRing 2.2s ease-out infinite;
        }
        @keyframes pulseRing {
            0% {
                transform: scale(0.9);
                opacity: 0.7;
            }
            70% {
                transform: scale(1.25);
                opacity: 0;
            }
            100% {
                transform: scale(1.25);
                opacity: 0;
            }
        }
        @keyframes iconPop {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .error-icon {
            width: 34px;
            height: 34px;
            position: relative;
            z-index: 1;
        }
        .error-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .cross-path {
            fill: none;
            stroke: #ef4444;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            animation: drawCross 0.5s ease-out 0.45s forwards;
        }
        @keyframes drawCross {
            to {
                stroke-dashoffset: 0;
            }
        }

        .card h1 {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .card .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-weight: 400;
            word-break: break-word;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: var(--accent);
            border-radius: 10px;
            margin: 0 auto 20px;
            opacity: 0.7;
        }

        .card .footer-note {
            margin-top: 18px;
            font-size: 0.78rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 32px;
                border-radius: 16px;
            }
            .card h1 {
                font-size: 1.5rem;
            }
            .error-icon-wrapper {
                width: 56px;
                height: 56px;
                margin-bottom: 16px;
            }
            .error-icon {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
<body>

<div class="bg-blur" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>

<div class="ambient-orb orb-1" aria-hidden="true"></div>
<div class="ambient-orb orb-2" aria-hidden="true"></div>
<div class="ambient-orb orb-3" aria-hidden="true"></div>

<div class="card">
    <div class="error-icon-wrapper">
        <div class="error-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path class="cross-path" d="M6 6l12 12M18 6l-12 12"/>
            </svg>
        </div>
    </div>

    <h1>登录错误</h1>
    <p class="subtitle">%error_message%</p>

    <div class="divider"></div>
    <p class="footer-note">请检查网络或稍后重试.</p>
</div>

</body>
</html>
